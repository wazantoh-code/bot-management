name = "xrynze-bot"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ==========================================
#  D1 DATABASE BINDING
# ==========================================
[[d1_databases]]
binding = "DB"
database_name = "xrynze-db"
database_id = "your-database-id-here"  # Ganti dengan ID database Anda

# ==========================================
#  NO STATIC ASSETS - PURE WORKER
# ==========================================
[site]
bucket = "."  # Jangan gunakan ini untuk pure worker
