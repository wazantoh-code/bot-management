name: Deploy Bot to Cloudflare Workers

on:
  push:
    branches:
      - main # Ganti jika nama branch utamamu berbeda (misal: master)

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: "5kgsA0ydXdqvsQI_puwLK7uoWz5r9O1xFZI0m-Re"
          command: deploy
